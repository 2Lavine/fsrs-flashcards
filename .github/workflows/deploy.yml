name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_alB6aOCXG3nySWZrVGOQnx9O
      VERCEL_PROJECT_ID: prj_dhMJoQA1ufKVOmYSDhzVOciWRpTk
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: npx vercel pull --yes --environment production --token ${{ secrets.VERCEL_TOKEN }}

      - run: npx vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}

      - run: |
          echo "=== function files ==="
          find .vercel/output/functions -type f -name "*.js" | head -5
          find .vercel/output/functions -type f -name "*.js" -exec wc -c {} \;
          echo "=== node_modules ==="
          find .vercel/output/functions -path "*/node_modules/.pnpm" -maxdepth 5 -type d | head -1 || echo "no .pnpm"
          ls "$(find .vercel/output/functions -path "*/node_modules/.pnpm" -maxdepth 5 -type d | head -1)" 2>/dev/null | head -3 || echo "EMPTY"

      - run: npx vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
