name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_alB6aOCXG3nySWZrVGOQnx9O
      VERCEL_PROJECT_ID: prj_dhMJoQA1ufKVOmYSDhzVOciWRpTk
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm vercel pull --yes --environment production --token ${{ secrets.VERCEL_TOKEN }}

      - run: pnpm vercel build --prod --token ${{ secrets.VERCEL_TOKEN }}

      - run: pnpm vercel deploy --prebuilt --prod --token ${{ secrets.VERCEL_TOKEN }}
